<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Crocheté</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-icon">
                <img src="images/homeicon.png" alt="Home icon" class="nav-icon-image">
            </a>
            <a href="shop.html" class="nav-link">SHOP</a>
            <a href="sellers.html" class="nav-link">SELLERS</a>
            <a href="cart.html" class="nav-link">CART</a>
            <a href="login.html" class="nav-link">ACCOUNT</a>
        </div>
    </nav>

    <div class="cart-container">
        <div class="cart-layout">
            <section class="cart-items">
                <h1 class="cart-title">Your Cart</h1>
                <div class="cart-list"></div>
                <div class="cart-empty">
                    <p>Your cart is empty.</p>
                    <a href="shop.html" class="btn-primary">Browse products</a>
                </div>
            </section>

            <aside class="cart-summary">
                <div class="summary-box">
                    <h2>Order Summary</h2>
                    <div class="summary-row">
                        <span>Items</span>
                        <span class="summary-items-count">0</span>
                    </div>
                    <div class="summary-row">
                        <span>Total</span>
                        <span class="summary-total">PHP0</span>
                    </div>
                    <button class="btn-primary checkout-btn">CHECKOUT</button>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
