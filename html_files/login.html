<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crocheté</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-icon">
                <img src="images/homeicon.png" alt="Home icon" class="nav-icon-image">
            </a>
            <a href="shop.html" class="nav-link">SHOP</a>
            <a href="sellers.html" class="nav-link">SELLERS</a>
            <a href="cart.html" class="nav-link">CART</a>
            <a href="login.html" class="nav-link">ACCOUNT</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-header">
            <a class="btn-primary">LOGIN</a>
        </div>

        <form class="login-form">
            <input type="text" placeholder="PHONE NUMBER / USERNAME / EMAIL" class="login-input">
            <input type="password" placeholder="PASSWORD" class="login-input">

            <button type="submit" class="login-submit-btn">LOG IN</button>

            <div class="forgot-password">
                <a href="#" class="forgot-link">FORGOT PASSWORD</a>
            </div>

            <div class="divider-text">
                <div class="line"></div>
                <span class="or-text">OR</span>
                <div class="line"></div>
            </div>

            <div class="social-buttons">
                <button type="button" class="social-btn">FACEBOOK</button>
                <button type="button" class="social-btn">GOOGLE</button>
            </div>

            <div class="signup-link">
                <a href="#" class="signup-text">SIGN UP</a>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
