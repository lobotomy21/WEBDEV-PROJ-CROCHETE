<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Items - Crocheté</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-icon">
                <img src="images/homeicon.png" alt="Home icon" class="nav-icon-image">
            </a>
            <a href="shop.html" class="nav-link">SHOP</a>
            <a href="sellers.html" class="nav-link">SELLERS</a>
            <a href="cart.html" class="nav-link">CART</a>
            <a href="login.html" class="nav-link">ACCOUNT</a>
        </div>
    </nav>

    <div class="sell-container">
        <h1 class="sell-title">SELL ITEMS</h1>

        <div class="sell-grid">
            <div class="upload-section">
                <div class="upload-box">
                    <p class="upload-text">UPLOAD<br>PHOTO</p>
                </div>
            </div>

            <form class="sell-form">
                <div class="form-group">
                    <label class="form-label">ITEM NAME</label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">CATEGORY</label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">SIZE</label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">PRICE</label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">DESCRIPTION</label>
                    <div class="form-input-wrapper">
                        <textarea rows="3" class="form-textarea"></textarea>
                    </div>
                </div>

                <div class="form-submit">
                    <button type="submit" class="btn-primary">POST</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
